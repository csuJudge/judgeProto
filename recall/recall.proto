syntax            = "proto3";
option go_package = "github.com/csuJudge/judgeProto/recall";

package oj.recall;

service RecallServer {
  rpc Recall(RecallReq) returns (RecallRsp) {}
}

message RecallRsp{
  string message = 1;  // 返回信息
  int32 code     = 2;  // 返回码
  repeated string problemIDs = 3; // 题目编号
}

message RecallReq{
  int32 userID = 1; // 用户编号
  int32 limit = 2; // 返回的数量
}